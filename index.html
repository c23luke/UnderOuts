<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Outs</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#2a3441;--text:#e6edf3;--muted:#8b98a5;--accent:#3fb950;--warn:#d29922;--hot:#f85149;--chip:#21262d}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);padding:16px;line-height:1.5}
  h1{font-size:19px;margin:0}
  .sub{color:var(--muted);font-size:12.5px;margin:2px 0 16px}
  .sec{color:var(--muted);font-size:12px;margin:18px 2px 8px;letter-spacing:.3px;text-transform:uppercase}
  .card{background:var(--panel);border-radius:14px;padding:12px 13px;margin-bottom:9px}
  .card.bet{border:1px solid #2f6b3d}
  .top{display:flex;justify-content:space-between;align-items:center;font-size:14.5px;font-weight:600}
  .bsub{color:var(--muted);font-size:12px;margin:3px 0 8px}
  .why{font-size:12.5px;margin:2px 0 8px}
  .track{position:relative;height:7px;background:var(--bg);border-radius:20px;overflow:hidden;margin-top:2px}
  .fill{position:absolute;left:0;top:0;bottom:0;border-radius:20px}
  .mark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--text)}
  .st{display:flex;justify-content:space-between;font-size:11px;margin-top:5px}
  .badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
  .note{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
  <h1>Under outs</h1>
  <div class="sub">your bets + tonight's model board · MLB pitcher outs</div>

  <div class="sec">Your bets</div>
  <div id="mybets"></div>

  <div class="sec">Tonight's board — ranked by model edge</div>
  <div id="board"><div class="note">Waiting for the model. Start the bot on your Mac (node ~/Downloads/alert.js) — the board updates every hour.</div></div>

<script>
const AMER=p=>(p==null?'':(p>0?('+'+p):(''+p)));
function betUnits(a){a=+a;if(isNaN(a))a=-110;return a>=0?a/100:100/Math.abs(a);}
let BOARD=[], BETS=[], LIVE={};

async function fetchBoard(){ try{ const d=await fetch('board.json',{cache:'no-store'}).then(r=>r.ok?r.json():[]); if(Array.isArray(d)) BOARD=d; }catch(e){} renderBoard(); }
async function fetchBets(){ try{ const d=await fetch('bets.json',{cache:'no-store'}).then(r=>r.ok?r.json():[]); if(Array.isArray(d)) BETS=d; }catch(e){} renderMyBets(); }
async function fetchLive(){
  try{
    const today=new Date().toLocaleDateString('en-CA');
    const s=await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+today,{cache:'no-store'}).then(r=>r.json());
    const games=(s.dates&&s.dates[0]&&s.dates[0].games)||[]; const live={};
    for(const g of games){ const stt=g.status&&g.status.abstractGameState; if(stt==='Preview') continue;
      const bx=await fetch('https://statsapi.mlb.com/api/v1/game/'+g.gamePk+'/boxscore',{cache:'no-store'}).then(r=>r.json());
      ['home','away'].forEach(side=>{ const t=bx.teams&&bx.teams[side]; if(!t) return;
        (t.pitchers||[]).forEach(pid=>{ const pl=t.players&&t.players['ID'+pid]; if(pl&&pl.stats&&pl.stats.pitching){ const nm=(pl.person&&pl.person.fullName)||''; const o=pl.stats.pitching.outs; const last=nm.toLowerCase().split(' ').pop(); if(last&&o!=null) live[last]={outs:+o,state:stt}; } }); });
    }
    LIVE=live; renderMyBets(); renderBoard();
  }catch(e){}
}

function liveStatus(name,line){
  const lv=LIVE[name.toLowerCase().split(' ').pop()]; if(!lv) return null;
  const fl=Math.floor(line);
  if(lv.state==='Final') return {outs:lv.outs, final:true, won:lv.outs<line};
  return {outs:lv.outs, final:false, busted:lv.outs>fl};
}

function renderMyBets(){
  const box=document.getElementById('mybets'); if(!box) return;
  let w=0,l=0,u=0;
  const rows=BETS.map(bt=>{
    const fl=Math.floor(bt.line), max=fl+4; const s=liveStatus(bt.name,bt.line);
    let outsTxt='—',col='var(--muted)',statL='<span class="note">not started</span>',statR='needs ≤'+fl,fillPct=0,fillCol='#2a3441';
    if(s){ outsTxt=s.outs+' outs'; fillPct=Math.min(100,Math.round(s.outs/max*100));
      if(s.final){ if(s.won){w++;u+=betUnits(bt.price);col=fillCol='var(--accent)';statL='<span style="color:var(--accent)">✓ won · +'+betUnits(bt.price).toFixed(2)+'u</span>';} else {l++;u-=1;col=fillCol='var(--hot)';statL='<span style="color:var(--hot)">✕ lost</span>';} statR='final'; }
      else { col=fillCol=s.busted?'var(--hot)':'var(--accent)'; statL='<span style="color:'+col+'">● live · '+(s.busted?'busted':'alive')+'</span>'; } }
    const why = bt.proj!=null ? ('We project ~<b>'+bt.proj+' outs</b> vs the '+bt.line+' line'+(bt.edge!=null?' — a <b style="color:var(--accent)">+'+bt.edge+'% edge</b>':'')+'.') : '';
    return '<div class="card bet"><div class="top"><span>'+bt.name+'</span><span style="color:'+col+'">'+outsTxt+'</span></div>'
      +'<div class="bsub">Under '+bt.line+' · '+AMER(bt.price)+'</div>'
      +(why?'<div class="why">'+why+'</div>':'')
      +'<div class="track"><div class="fill" style="width:'+fillPct+'%;background:'+fillCol+'"></div><div class="mark" style="left:'+Math.round(fl/max*100)+'%"></div></div>'
      +'<div class="st">'+statL+'<span class="note">'+statR+'</span></div></div>';
  }).join('');
  const rec=(w+l)?('<span style="color:'+(w>=l?'var(--accent)':'var(--hot)')+'">'+w+'-'+l+'</span> · <span style="color:'+(u>=0?'var(--accent)':'var(--hot)')+'">'+(u>=0?'+':'')+u.toFixed(2)+'u</span>'):'<span class="note">none graded yet</span>';
  box.innerHTML='<div style="display:flex;justify-content:flex-end;margin-bottom:6px;font-size:12px">'+rec+'</div>'
    +(BETS.length?rows:'<div class="note">No bets yet — the bot adds one automatically when it finds a +EV under.</div>');
}

function renderBoard(){
  const box=document.getElementById('board'); if(!box) return;
  if(!BOARD.length) return;
  box.innerHTML=BOARD.map(p=>{
    const edge=p.edge; const good=edge>=6;
    const badgeCol = edge>=6?'background:#12291a;color:#7ee787':(edge>=0?'background:#2a2411;color:#e3b341':'background:var(--chip);color:var(--muted)');
    const label = edge>=6?('BET · +'+edge+'%'):(edge>=0?('lean +'+edge+'%'):('pass '+edge+'%'));
    const s=liveStatus(p.name,p.line); let live='';
    if(s){ const c=s.final?'#8b98a5':(s.busted?'#ff7b72':'#3fb950'); live=' · <span style="color:'+c+'">'+(s.final?'final ':'🔴 ')+s.outs+' outs</span>'; }
    const why='We project ~<b>'+p.proj+' outs</b>'+(p.pUnder!=null?', so the under hits about <b>'+p.pUnder+'%</b> of the time':'')+'. Line '+p.line+'.';
    return '<div class="card'+(good?' bet':'')+'"><div class="top"><span>'+p.name+'</span><span class="badge" style="'+badgeCol+'">'+label+'</span></div>'
      +'<div class="bsub">Under '+p.line+' · '+AMER(p.under)+' · '+(p.book||'')+live+'</div>'
      +'<div class="why">'+why+'</div></div>';
  }).join('');
}

try{ ['uo_mybets','uo_plays','uo_seeded_0710','uo_seeded','uo_track_start','uo_autoref','uo_book'].forEach(k=>localStorage.removeItem(k)); }catch(e){}
fetchBoard(); fetchBets(); fetchLive();
setInterval(()=>{ fetchBoard(); fetchBets(); fetchLive(); }, 120000);
</script>
</body>
</html>
