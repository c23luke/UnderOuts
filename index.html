<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Outs</title>
<style>
  :root{--bg:#0a0e14;--card:#111722;--card2:#161d2a;--line:#1e2836;--text:#eef3fa;--muted:#6b7789;--dim:#5f6b7d;--green:#00e58a;--amber:#e0a33a;--red:#ff5c5c}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;padding:20px 16px 44px;max-width:520px;margin:0 auto}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .logo{font-size:16px;font-weight:800;letter-spacing:.5px}
  .logo span{color:var(--green)}
  .topsub{font-size:11px;color:var(--dim)}
  .stats{display:flex;gap:9px;margin-bottom:24px}
  .stat{flex:1;background:var(--card);border-radius:14px;padding:13px 12px}
  .stat .v{font-size:23px;font-weight:800;line-height:1}
  .stat .k{font-size:10px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;margin-top:4px}
  .lab{font-size:11px;color:var(--dim);letter-spacing:.6px;text-transform:uppercase;margin:0 2px 11px}
  .bet{background:var(--card);border-radius:16px;padding:15px;margin-bottom:11px;border-left:3px solid var(--green)}
  .bet.amber{border-left-color:var(--amber)}
  .bet .r1{display:flex;justify-content:space-between;align-items:flex-start}
  .nm{font-size:16.5px;font-weight:700}
  .sub{font-size:12px;color:var(--muted);margin-top:1px}
  .edge{text-align:right}
  .edge .e{font-size:26px;font-weight:800;line-height:1;color:var(--green)}
  .edge.amber .e{color:var(--amber)}
  .edge .l{font-size:9px;color:var(--dim);letter-spacing:.5px}
  .row2{display:flex;gap:8px;align-items:center;margin-top:11px;flex-wrap:wrap}
  .pill{font-size:10px;font-weight:700;color:var(--bg);padding:3px 9px;border-radius:6px;letter-spacing:.3px}
  .pill.g{background:var(--green)} .pill.a{background:var(--amber)}
  .meta{font-size:11px;color:var(--muted)}
  .lv{margin-top:11px;font-size:12px;font-weight:600}
  .track{height:6px;background:#0a0e14;border-radius:20px;overflow:hidden;margin:7px 0 5px;position:relative}
  .track .f{height:100%;border-radius:20px}
  .empty{background:var(--card);border-radius:14px;padding:20px;text-align:center;color:var(--muted);font-size:13px}
  .brow{display:flex;align-items:center;gap:9px;padding:11px 4px;border-bottom:1px solid var(--line);font-size:13px}
  .brow .n{flex:1;min-width:0}
  .brow .t2{font-size:11px;color:var(--dim)}
  .tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
  .tag.g{color:var(--green);background:rgba(0,229,138,.13)} .tag.a{color:var(--amber);background:rgba(224,163,58,.14)} .tag.p{color:var(--dim);background:#141a24}
  .hrow{display:flex;justify-content:space-between;align-items:center;padding:10px 3px;border-bottom:1px solid var(--line);font-size:13px}
  .systems{margin:-12px 0 24px}
  .syscap{font-size:10px;color:var(--dim);letter-spacing:.6px;text-transform:uppercase;margin:0 2px 9px}
  .sysrow{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:11px 13px;margin-bottom:7px}
  .sysrow.b{border-left:3px solid var(--green)} .sysrow.a{border-left:3px solid var(--amber)} .sysrow.n{border-left:3px solid var(--dim)}
  .sysL{font-size:11.5px;font-weight:700;letter-spacing:.3px}
  .sysL b{font-size:9.5px;color:var(--dim);font-weight:700;margin-left:5px}
  .sysR{display:flex;gap:13px;font-size:13px;font-weight:700}
  .sysR .lbl{font-size:9px;color:var(--dim);font-weight:600;display:block;letter-spacing:.4px;text-align:right}
</style>
</head>
<body>
  <div class="top"><div class="logo">UNDER<span>OUTS</span></div><div class="topsub" id="topsub"></div></div>
  <div class="stats" id="stats"></div>
  <div class="systems" id="systems"></div>

  <div class="lab">Tonight's bets</div>
  <div id="bets"></div>

  <div class="lab" style="margin-top:26px">Correlated F5 Â· Over Â· ML Â· Run Line</div>
  <div id="corr"><div class="empty">No correlated bets yet. Fires whenever an under-outs alert sends.</div></div>

  <div class="lab" style="margin-top:26px">Board Â· ranked by edge</div>
  <div id="board"><div class="empty">Waiting on the model â€” start the bot on your Mac. Updates hourly.</div></div>

  <div class="lab" style="margin-top:26px">Recent results</div>
  <div id="hist"><div class="empty">No graded bets yet.</div></div>

<script>
const AMER=p=>(p==null?'':(p>0?('+'+p):(''+p)));
function bu(a){a=+a;if(isNaN(a))a=-110;return a>=0?a/100:100/Math.abs(a);}
let BOARD=[],BETS=[],HIST=[],CORR=[],SYS=[],LIVE={};

async function j(u){ try{const d=await fetch(u,{cache:'no-store'}).then(r=>r.ok?r.json():null); return Array.isArray(d)?d:[];}catch(e){return [];} }
async function load(){ BOARD=await j('board.json'); BETS=await j('bets.json'); HIST=await j('history.json'); CORR=await j('correlated.json'); SYS=await j('systems.json'); await live(); renderAll(); }
async function live(){
  try{ const t=new Date().toLocaleDateString('en-CA');
    const s=await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+t,{cache:'no-store'}).then(r=>r.json());
    const g=(s.dates&&s.dates[0]&&s.dates[0].games)||[]; const L={};
    for(const gm of g){ const st=gm.status&&gm.status.abstractGameState; if(st==='Preview')continue;
      const bx=await fetch('https://statsapi.mlb.com/api/v1/game/'+gm.gamePk+'/boxscore',{cache:'no-store'}).then(r=>r.json());
      ['home','away'].forEach(sd=>{const tm=bx.teams&&bx.teams[sd];if(!tm)return;(tm.pitchers||[]).forEach(pid=>{const pl=tm.players&&tm.players['ID'+pid];if(pl&&pl.stats&&pl.stats.pitching){const nm=(pl.person&&pl.person.fullName)||'';const o=pl.stats.pitching.outs;const k=nm.toLowerCase().split(' ').pop();if(k&&o!=null)L[k]={outs:+o,state:st};}});});
    }
    LIVE=L;
  }catch(e){}
}
function lv(n){return LIVE[n.toLowerCase().split(' ').pop()];}

function renderAll(){ renderStats(); renderBets(); renderBoard(); renderCorr(); renderHist(); }

function renderCorr(){
  const box=document.getElementById('corr'); if(!CORR.length)return;
  const chip=r=>r==='W'?'<b style="color:var(--green)">W</b>':r==='L'?'<b style="color:var(--red)">L</b>':r==='P'?'<b style="color:var(--muted)">push</b>':'<span style="color:var(--dim)">â—·</span>';
  // F5 OVER system record â€” taking the over when a bad-arm pitcher is on the mound
  const sumOv=arr=>{const g=arr.filter(c=>c.ovResult&&c.ovResult!=='P');const w=g.filter(c=>c.ovResult==='W').length,l=g.length-w;let u=0;g.forEach(c=>u+=c.ovResult==='W'?bu(c.f5totOver):-1);return {w,l,u,n:g.length};};
  const ovShort=sumOv(CORR.filter(c=>c.short)), ovAll=sumOv(CORR);
  const sysrow=(cls,label,tag,s)=> s.n? ('<div class="sysrow '+cls+'"><div class="sysL">'+label+' <b>'+tag+' Â· '+Math.round(s.w/s.n*100)+'%</b></div><div class="sysR"><span>'+s.w+'-'+s.l+'</span><span style="color:'+(s.u>=0?'var(--green)':'var(--red)')+'">'+(s.u>=0?'+':'')+s.u.toFixed(1)+'u</span></div></div>') : '';
  let head='';
  if(ovAll.n){ head='<div class="systems" style="margin:0 0 14px">'+sysrow('b','F5 OVER Â· bad arm + short','O '+ovShort.n,ovShort)+sysrow('a','F5 OVER Â· any bad arm','O '+ovAll.n,ovAll)+'</div>'; }
  box.innerHTML= head + CORR.slice(0,24).map(c=>{
    const runs=c.f5Total!=null?(c.f5Total+'r F5'):(c.graded?(c.oppF5+'-'+c.ownF5+' F5'):'tracking');
    const ml=c.f5ml!=null?('ML '+AMER(c.f5ml)+' '+chip(c.mlResult)):'';
    const rl=c.f5rlPoint!=null?('RL '+(c.f5rlPoint>0?'+':'')+c.f5rlPoint+' '+chip(c.rlResult)):'';
    const ov=c.f5totPoint!=null?('O'+c.f5totPoint+' '+AMER(c.f5totOver)+' '+chip(c.ovResult)):'';
    const parts=[ov,ml,rl].filter(Boolean).join(' Â· ');
    const badge=c.short?'<span style="color:var(--green)">â—Ź</span> ':'<span style="color:var(--amber)">â—Ź</span> ';
    return '<div class="hrow"><div><div>'+badge+c.oppTeam+' <span style="color:var(--dim);font-size:11px">off '+c.pitcher+'</span></div><div class="t2">'+parts+' Â· '+runs+'</div></div><div style="font-size:11px;color:var(--dim)">'+c.date+'</div></div>';
  }).join('');
}

function calcSys(arr){ const w=arr.filter(r=>r.won).length,l=arr.length-w; let u=0; arr.forEach(r=>u+= r.won?bu(r.price):-1); const roi=arr.length?(u/arr.length*100):0; return {w,l,u,roi,n:arr.length}; }
function renderStats(){
  const g=HIST; const o=calcSys(g);
  document.getElementById('topsub').textContent = BOARD.length? (BOARD.length+' priced Â· '+BOARD.filter(p=>p.bet).length+' bets tonight') : '';
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="v">'+o.w+'-'+o.l+'</div><div class="k">record</div></div>'
   +'<div class="stat"><div class="v" style="color:'+(o.u>=0?'var(--green)':'var(--red)')+'">'+(o.u>=0?'+':'')+o.u.toFixed(1)+'u</div><div class="k">profit</div></div>'
   +'<div class="stat"><div class="v" style="color:'+(o.roi>=0?'var(--green)':'var(--red)')+'">'+(o.roi>=0?'+':'')+o.roi.toFixed(0)+'%</div><div class="k">roi</div></div>';
  // by-system breakdown backtested across EVERY bad-arm start (systems.json), not just flagship bets:
  //   BAD ARM = all SIERAâ‰Ą4.4 Â· BAD ARM + SHORT = the short subset
  const base = SYS.length ? SYS : g.map(r=>({won:r.won,price:r.price,short:r.tag==='both',sharp:true}));
  const badArm=calcSys(base);                       // 1: bet under on EVERY bad arm (SIERAâ‰Ą4.4)
  const shortS=calcSys(base.filter(r=>r.short));     // 2: + projected short
  const sharpS=calcSys(base.filter(r=>r.sharp));     // 3: + cleared edge = the picks actually sent
  const num=(c)=>'<div class="sysR"><span>'+c.w+'-'+c.l+'</span><span style="color:'+(c.u>=0?'var(--green)':'var(--red)')+'">'+(c.u>=0?'+':'')+c.u.toFixed(1)+'u</span><span style="color:'+(c.roi>=0?'var(--green)':'var(--red)')+'">'+(c.roi>=0?'+':'')+c.roi.toFixed(0)+'%</span></div>';
  const row=(cls,label,tag,c)=> c.n? ('<div class="sysrow '+cls+'"><div class="sysL">'+label+' <b>'+tag+' Â· '+(c.n?Math.round(c.w/c.n*100):0)+'%</b></div>'+num(c)+'</div>') : '';
  document.getElementById('systems').innerHTML =
      '<div class="syscap">Three systems tracked Â· widest â†’ sharpest</div>'
    + row('n','BAD ARM Â· SIERA â‰Ą4.4','ALL '+badArm.n,badArm)
    + row('a','BAD ARM + SHORT','SHORT '+shortS.n,shortS)
    + row('b','+ SHARP Â· sent picks','SENT '+sharpS.n,sharpS);
}

function liveLine(name,line){
  const l=lv(name); const fl=Math.floor(line);
  if(!l) return '<div class="lv" style="color:var(--dim)">â—· first pitch soon</div>';
  const o=l.outs,over=o>fl,fin=l.state==='Final',col=over?'var(--red)':'var(--green)';
  const pct=fin?(over?0:100):Math.max(0,Math.round((fl-o)/fl*100));
  const txt=fin?(over?'âś— lost Â· '+o+' outs':'âś“ won Â· '+o+' outs'):(over?'busted Â· '+o+' outs':o+' outs Â· '+(fl-o)+' to spare');
  return '<div class="track"><div class="f" style="width:'+(fin?(over?100:pct):pct)+'%;background:'+col+'"></div></div><div class="lv" style="color:'+col+'">'+txt+'</div>';
}

function renderBets(){
  const box=document.getElementById('bets');
  if(!BETS.length){box.innerHTML='<div class="empty">No bets tonight â€” nothing cleared the bar. Passing is the play.</div>';return;}
  box.innerHTML=BETS.map(b=>{
    const both=b.tag==='both'; const ec=both?'':' amber';
    // every sent bet is BAD ARM + SHARP; add SHORT when tagged 'both'
    const badges=[['BAD ARM','a']].concat(both?[['SHORT','a']]:[]).concat([['SHARP','g']]);
    const pills=badges.map(x=>'<span class="pill '+x[1]+'">'+x[0]+'</span>').join(' ');
    return '<div class="bet'+(both?'':' amber')+'"><div class="r1"><div><div class="nm">'+b.name+'</div><div class="sub">Under '+b.line+' Â· '+AMER(b.price)+'</div></div>'
      +'<div class="edge'+ec+'"><div class="e">+'+b.edge+'%</div><div class="l">EDGE</div></div></div>'
      +'<div class="row2">'+pills+'<span class="meta">SIERA '+(b.siera?b.siera.toFixed(1):'â€”')+' Â· proj '+b.proj+' outs</span></div>'
      +liveLine(b.name,b.line)+'</div>';
  }).join('');
}

function renderBoard(){
  const box=document.getElementById('board'); if(!BOARD.length)return;
  box.innerHTML=BOARD.map(p=>{
    const l=lv(p.name); let ls=''; if(l){const fl=Math.floor(p.line);const over=l.outs>fl;ls='<span style="color:'+(over?'var(--red)':'var(--green)')+';font-size:11px">'+l.outs+' outs</span>';}
    const tag=p.bet?('<span class="tag '+(p.tag==='both'?'g':'a')+'">'+(p.tag==='both'?'BOTH':'BAD ARM')+'</span>'):'<span class="tag p">pass</span>';
    return '<div class="brow"><div class="n"><div>'+p.name+(p.siera!=null?' <span style="color:var(--dim);font-size:11px">SIERA '+p.siera.toFixed(1)+'</span>':'')+'</div><div class="t2">proj '+p.proj+' vs '+p.line+' Â· '+(p.edge>=0?'+':'')+p.edge+'%</div></div>'+ls+tag+'</div>';
  }).join('');
}

function renderHist(){
  const box=document.getElementById('hist'); if(!HIST.length)return;
  box.innerHTML=HIST.slice(0,12).map(r=>'<div class="hrow"><div><div>'+r.name+' <span style="color:var(--dim);font-size:11px">'+r.date+'</span></div><div class="t2">U '+r.line+' ('+AMER(r.price)+') Â· '+(r.tag==='both'?'bad arm + short + sharp':'bad arm + sharp')+' Â· '+r.actualOuts+' outs</div></div><b style="color:'+(r.won?'var(--green)':'var(--red)')+'">'+(r.won?'WON':'LOST')+'</b></div>').join('');
}

load(); setInterval(load, 120000);
</script>
</body>
</html>
